version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: chat-postgres
    environment:
      POSTGRES_USER: chat
      POSTGRES_PASSWORD: chat
      POSTGRES_DB: chat
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chat -d chat"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chat-server
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://chat:chat@postgres:5432/chat?sslmode=disable
      HTTP_ADDR: ":8080"
    expose:
      - "8080"
    restart: on-failure
    deploy:
      resources:
        limits:
          memory: 300m

  nginx:
    image: nginx:1.27-alpine
    container_name: chat-nginx
    depends_on:
      - server
    ports:
      - "80:80"
    ulimits:
      nofile:
        soft: 32768
        hard: 32768
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    deploy:
      resources:
        limits:
          memory: 300m
