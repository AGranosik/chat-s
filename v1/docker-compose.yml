version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: chat-postgres
    environment:
      POSTGRES_USER: chat
      POSTGRES_PASSWORD: chat
      POSTGRES_DB: chat
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chat -d chat"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chat-server
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://chat:chat@postgres:5432/chat?sslmode=disable
      HTTP_ADDR: ":8080"
    expose:
      - "8080" # internal only: reachable by nginx on the compose network, never published to the host
    restart: on-failure
    # Each proxied websocket is one fd on the server; the daemon default (often
    # 1024) caps us near ~1000 conns. Raised high enough that fds never bind
    # before the 600m memory budget does (load-test SUT — see loadtest/BASELINE.md).
    # somaxconn deepens the accept queue so a connect burst doesn't overflow it
    # and get RST (Go sizes the listen backlog from net.core.somaxconn).
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    sysctls:
      net.core.somaxconn: 65535
    deploy:
      resources:
        limits:
          # Fixed budget under test: how many ws / what message rate fits in 600m.
          memory: 600m

  nginx:
    image: nginx:1.27-alpine
    container_name: chat-nginx
    depends_on:
      - server
    ports:
      - "80:80"
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    deploy:
      resources:
        limits:
          # Headroom so nginx is never the wall — the 600m server is the SUT.
          memory: 512m
