# Each proxied websocket uses two connection slots (downstream + upstream), so
# the effective client ceiling is worker_connections / 2 (per worker). Raised
# well past the Go server's 600m capacity so nginx is never the bottleneck while
# load-testing the app's limits (see loadtest/BASELINE.md). The matching fd limit
# must be lifted too (worker_rlimit_nofile + the container ulimit).
worker_processes auto;
worker_rlimit_nofile 262144;

events {
    worker_connections 65536; # ÷2 slots/ws ⇒ ~32k ws per worker
}

http {
    # Map the Upgrade header so websocket connections proxy correctly.
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    upstream chat_backend {
        server server:8080; # single upstream for now (the scaling seam)
    }

    server {
        listen 80;

        location / {
            proxy_pass http://chat_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 3600s; # keep long-lived ws connections open
        }
    }
}
